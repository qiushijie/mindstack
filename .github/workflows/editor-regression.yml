name: Editor Regression

on:
  pull_request:
    paths:
      - 'frontend/src/components/CodeMirrorEditor.vue'
      - 'frontend/src/components/FindPanel.vue'
      - 'frontend/src/composables/useCodeMirror.ts'
      - 'frontend/src/composables/useEditorState.ts'
      - 'frontend/src/extensions/**'
      - 'frontend/src/utils/markdownUtils.ts'
      - 'frontend/src/utils/tableUtils.ts'
      - 'frontend/src/utils/syntaxUtils.ts'
      - 'frontend/src/editor/**'
      - '.github/workflows/editor-regression.yml'
      - 'scripts/editor-regression.sh'
      - 'tests/e2e/**'
      - 'tests/e2e/package.json'
      - 'tests/e2e/playwright.config.ts'
  push:
    branches: [main]
    paths:
      - 'frontend/src/**'
      - '.github/workflows/editor-regression.yml'
      - 'scripts/editor-regression.sh'
      - 'tests/e2e/**'
      - 'tests/e2e/package.json'
      - 'tests/e2e/playwright.config.ts'

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install

      - name: Run frontend unit tests
        working-directory: frontend
        run: pnpm vitest run

      - name: Run TypeScript type check
        working-directory: frontend
        run: pnpm exec vue-tsc --noEmit

  editor-e2e:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install Wails Linux dependencies
        run: |
          sudo apt update
          sudo apt install -y libgtk-3-dev libwebkit2gtk-4.0-dev libwebkit2gtk-4.1-dev pkg-config build-essential

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install e2e dependencies
        working-directory: tests/e2e
        run: pnpm install

      - name: Install Playwright Chromium
        working-directory: tests/e2e
        run: pnpm exec playwright install chromium

      - name: Run editor e2e specs
        working-directory: tests/e2e
        run: pnpm test -- specs/editor-selection-stability.spec.ts specs/editor-widget-selection.spec.ts specs/editor-long-document.spec.ts

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/test-results/
          retention-days: 7
